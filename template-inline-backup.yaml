  # Lambda permission for S3 to invoke Orchestrator Lambda
  OrchestratorLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrchestratorLambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt MarketBucket.Arn

  # SNS Topic for Critical Error Notifications
  CriticalErrorTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-critical-errors-${Environment}'
      DisplayName: !Sub 'Contract Analysis Pipeline Critical Errors (${Environment})'
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: Critical error notifications

  # SNS Topic Policy
  CriticalErrorTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CriticalErrorTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaPublish
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - 'sns:Publish'
            Resource: !Ref CriticalErrorTopic
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref AWS::AccountId
          - Sid: AllowAccountOwnerManagement
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'sns:Subscribe'
              - 'sns:SetTopicAttributes'
              - 'sns:RemovePermission'
              - 'sns:Receive'
              - 'sns:Publish'
              - 'sns:ListSubscriptionsByTopic'
              - 'sns:GetTopicAttributes'
              - 'sns:DeleteTopic'
              - 'sns:AddPermission'
            Resource: !Ref CriticalErrorTopic

  # Email Subscription for Critical Errors
  CriticalErrorEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      Protocol: email
      TopicArn: !Ref CriticalErrorTopic
      Endpoint: !Ref AlertEmail

